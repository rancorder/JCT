<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>調達状況の整理と、選択肢のご紹介｜JCT</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="stage" id="stage">
    <!-- ここにJSでスライドを差し込む -->
  </div>

  <script type="module">
    import { renderSlide, totalSlides } from "./render.js";

    const stage = document.getElementById("stage");
    const channel = new BroadcastChannel("jct-preslide-sync");
    let currentIndex = 0;

    function paint(index) {
      currentIndex = Math.max(0, Math.min(index, totalSlides() - 1));
      stage.innerHTML = renderSlide(currentIndex);
    }

    // 初期表示（presenterがまだ開いていない場合でも1枚目を表示しておく）
    paint(0);

    // presenter.html からの操作を受信
    channel.onmessage = (ev) => {
      const msg = ev.data;
      if (!msg) return;
      if (msg.type === "goto" && typeof msg.index === "number") {
        paint(msg.index);
      }
    };

    // presenterが既に起動していた場合、現在のスライドを問い合わせる
    channel.postMessage({ type: "requestState" });

    // キーボード操作は presenter.html 側でのみ有効。
    // このオーディエンス画面は「見せるだけ」の画面として、誤操作を防ぐため操作を持たない。
  </script>
</body>
</html>
